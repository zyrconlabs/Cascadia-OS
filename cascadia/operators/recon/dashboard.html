<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recon Worker — Zyrcon Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ffffff;
  --surface:  #f8f9fb;
  --surface2: #f1f3f6;
  --border:   #dde1e8;
  --border2:  #c5cad4;
  --text:     #1a2744;
  --muted:    #6e7787;
  --accent:   #2e4470;
  --accent2:  #5e7faa;
  --warn:     #d4a017;
  --danger:   #e8453c;
  --green:    #34c759;
  --mono:     "IBM Plex Mono", monospace;
  --head:     "Figtree", sans-serif;
  --body:     "Figtree", sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 15px;
  letter-spacing: 0.01em;
  min-height: 100vh;
  overflow-x: hidden;
}



/* ── Layout ───────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-rows: 56px 1fr;
  grid-template-columns: 260px 1fr;
  grid-template-areas:
    "header header"
    "sidebar main";
  min-height: 100vh;
}

/* ── Header ───────────────────────────────────────────────── */
header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark::after {
  content: "";
  width: 10px; height: 10px;
  background: var(--bg);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}
.logo-text {
  font-family: var(--head);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #fff;
}
.logo-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  border: 1px solid var(--border2);
}
.pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s;
}
.pill[data-status="running"] .pill-dot {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 1.8s ease-in-out infinite;
}
.pill[data-status="stopped"] .pill-dot { background: var(--danger); }
.pill[data-status="idle"]    .pill-dot { background: var(--muted); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── Sidebar ──────────────────────────────────────────────── */
aside {
  grid-area: sidebar;
  border-right: 1px solid var(--border);
  background: var(--surface);
  padding: 24px 0;
  overflow-y: auto;
}

.sidebar-section {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.sidebar-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: block;
}

/* Model selector */
.model-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  cursor: pointer;
  appearance: none;
  outline: none;
  transition: border-color 0.2s;
}
.model-select:focus { border-color: var(--accent); }

/* Stop button */
.btn-stop {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--danger);
  border-radius: 6px;
  color: var(--danger);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  margin-top: 8px;
  text-transform: uppercase;
}
.btn-stop:hover { background: var(--danger); color: #fff; }

/* File tree */
.tree { list-style: none; }
.tree-task {
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 6px;
  padding: 4px 0;
  letter-spacing: 0.04em;
}
.tree-day {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  padding: 2px 0 2px 12px;
  margin-bottom: 2px;
}
.tree-part {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  opacity: 0.7;
  padding: 1px 0 1px 24px;
}
.tree-part span { color: var(--muted); margin-left: 4px; }

/* ── Main ─────────────────────────────────────────────────── */
main {
  grid-area: main;
  padding: 28px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── Cards ────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
}
.card-title {
  font-family: var(--head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

/* ── Stat row ─────────────────────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.stat-value {
  font-family: var(--head);
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.warn   { color: var(--warn); }

/* ── Progress bar ─────────────────────────────────────────── */
.progress-wrap {
  margin-top: 8px;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}
.progress-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.6s ease;
  min-width: 4px;
}

/* ── Task info ────────────────────────────────────────────── */
.task-goal {
  font-family: var(--body);
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 12px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.kv {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.kv-key {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.kv-val {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
}
.kv-val.accent { color: var(--accent); }

/* ── Data table ───────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 11px;
}
thead th {
  text-align: left;
  padding: 8px 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:hover { background: var(--surface2); }
tbody td {
  padding: 8px 12px;
  color: var(--text);
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.conf-high   { color: var(--green); }
.conf-medium { color: var(--warn); }
.conf-low    { color: var(--danger); }
.empty-row {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-style: italic;
}

/* ── Log ──────────────────────────────────────────────────── */
.log-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.7;
  max-height: 220px;
  overflow-y: auto;
  color: var(--muted);
}
.log-line { display: block; }
.log-line.info  { color: var(--accent); }
.log-line.warn  { color: var(--warn); }
.log-line.error { color: var(--danger); }
.log-line .ts   { color: var(--muted); margin-right: 8px; }

/* ── Notification toast ───────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="shell">

<!-- ── Header ── -->
<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <div>
      <div class="logo-text">ZYRCON LABS</div>
      <div class="logo-sub">Recon Worker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="pill" id="status-pill" data-status="idle">
      <span class="pill-dot"></span>
      <span id="status-text">IDLE</span>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="clock"></div>
  </div>
</header>

<!-- ── Sidebar ── -->
<aside>
  <div class="sidebar-section">
    <span class="sidebar-label">Model</span>
    <select class="model-select" id="model-select" onchange="setModel(this.value)">
      <option value="zyrcon-3b">zyrcon-3b  (local · 8080)</option>
      <option value="zyrcon-7b">zyrcon-7b  (local · 8080)</option>
      <option value="zyrcon-fast">zyrcon-fast  (local · 8080)</option>
    </select>
    <button class="btn-stop" onclick="stopWorker()">⬛ Stop Worker</button>
  </div>

  <div class="sidebar-section">
    <span class="sidebar-label">Output files</span>
    <ul class="tree" id="file-tree">
      <li style="font-family:var(--mono);font-size:10px;color:var(--muted)">No output yet</li>
    </ul>
  </div>
</aside>

<!-- ── Main ── -->
<main>

  <!-- Task info -->
  <div class="card">
    <div class="card-title">Current task</div>
    <div class="task-goal" id="task-goal">—</div>
    <div class="kv-row">
      <div class="kv"><div class="kv-key">Task name</div><div class="kv-val" id="kv-name">—</div></div>
      <div class="kv"><div class="kv-key">Stop mode</div><div class="kv-val" id="kv-mode">—</div></div>
      <div class="kv"><div class="kv-key">Started</div><div class="kv-val" id="kv-start">—</div></div>
      <div class="kv"><div class="kv-key">Active model</div><div class="kv-val accent" id="kv-model">—</div></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total rows</div>
      <div class="stat-value accent" id="stat-rows">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Cycles</div>
      <div class="stat-value" id="stat-cycles">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last cycle</div>
      <div class="stat-value" style="font-size:16px;padding-top:6px" id="stat-last">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-value" style="font-size:18px;padding-top:4px" id="stat-status">—</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-card" style="display:none">
    <div class="card-title">Progress</div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">—</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Recent data -->
  <div class="card">
    <div class="card-title">Recent results</div>
    <div class="table-wrap">
      <table>
        <thead id="table-head"><tr><th>No data yet</th></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="card-title">Worker log (tail)</div>
    <div class="log-box" id="log-box"></div>
  </div>

</main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Clock ─────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("en-US", {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}

// ── Stop worker ───────────────────────────────────────────────────────────
async function stopWorker() {
  if (!confirm("Send stop signal to Recon Worker?")) return;
  const res = await fetch("/api/stop", {method:"POST"});
  const data = await res.json();
  showToast(data.message || "Stop signal sent.");
}

// ── Set model ─────────────────────────────────────────────────────────────
async function setModel(model) {
  const res  = await fetch("/api/model", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({model})});
  const data = await res.json();
  if (data.ok) showToast("Model set → " + model);
}

// ── Render helpers ─────────────────────────────────────────────────────────
function renderStatus(state) {
  const pill   = document.getElementById("status-pill");
  const text   = document.getElementById("status-text");
  const status = (state.status || "idle").toLowerCase();
  pill.dataset.status = status === "running" ? "running" : status === "stop" || status === "stopped" ? "stopped" : "idle";
  text.textContent = status.toUpperCase();

  document.getElementById("stat-status").textContent = status.toUpperCase();
  document.getElementById("stat-rows").textContent   = state.total_rows || 0;
  document.getElementById("stat-cycles").textContent = state.cycle || 0;

  const last = state.last_cycle
    ? new Date(state.last_cycle).toLocaleTimeString("en-US", {hour12:false, hour:"2-digit", minute:"2-digit"})
    : "—";
  document.getElementById("stat-last").textContent = last;

  const sel = document.getElementById("model-select");
  const m   = state.model || "zyrcon-3b";
  if (sel.value !== m) sel.value = m;
  document.getElementById("kv-model").textContent = m;
}

function renderTask(task) {
  document.getElementById("task-goal").textContent = task.goal || "No active task";
  document.getElementById("kv-name").textContent   = task.name || "—";
  document.getElementById("kv-mode").textContent   = task.mode || "—";
  document.getElementById("kv-start").textContent  = task.status || "—";
}

function renderProgress(progress) {
  const card = document.getElementById("progress-card");
  if (!progress || !progress.mode || progress.mode === "status") { card.style.display = "none"; return; }
  card.style.display = "";
  const pct = Math.min(progress.pct || 0, 100);
  document.getElementById("prog-bar").style.width = pct + "%";
  document.getElementById("prog-pct").textContent = pct.toFixed(1) + "%";

  if (progress.mode === "quantity") {
    document.getElementById("prog-label").textContent = `${progress.current} / ${progress.target} rows`;
  } else if (progress.mode === "time") {
    document.getElementById("prog-label").textContent = `Elapsed: ${progress.elapsed}  |  Remaining: ${progress.remaining}`;
  }
}

function renderTree(tree) {
  const el = document.getElementById("file-tree");
  if (!tree || tree.length === 0) { el.innerHTML = '<li style="font-family:var(--mono);font-size:10px;color:var(--muted)">No output yet</li>'; return; }
  el.innerHTML = tree.map(t => `
    <li class="tree-task">${t.task}</li>
    ${(t.days||[]).map(d => `
      <li class="tree-day">${d.day}</li>
      ${(d.parts||[]).map(p => `<li class="tree-part">${p.file}<span>${p.rows}r · ${p.size_kb}kb</span></li>`).join("")}
    `).join("")}
  `).join("");
}

function renderLog(lines) {
  const box = document.getElementById("log-box");
  box.innerHTML = (lines || []).map(l => {
    const lvl = l.includes("ERROR") ? "error" : l.includes("WARNING") ? "warn" : "info";
    const ts  = l.match(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/)?.[0] || "";
    const msg = l.replace(ts, "").replace(/^\s+/, "");
    return `<span class="log-line ${lvl}"><span class="ts">${ts}</span>${escHtml(msg)}</span>`;
  }).join("");
  box.scrollTop = box.scrollHeight;
}

function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function renderRows() {
  const res  = await fetch("/api/rows?n=20");
  const rows = await res.json();
  const thead = document.getElementById("table-head");
  const tbody = document.getElementById("table-body");
  if (!rows || rows.length === 0) {
    thead.innerHTML = "<tr><th>No data yet</th></tr>";
    tbody.innerHTML = `<tr><td class="empty-row">Worker hasn't written any rows yet.</td></tr>`;
    return;
  }
  const keys = Object.keys(rows[0]).filter(k => !k.startsWith("_")).slice(0, 8);
  thead.innerHTML = "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";
  tbody.innerHTML = rows.map(r => {
    const conf = (r.confidence||"").toLowerCase();
    const cls  = conf === "high" ? "conf-high" : conf === "medium" ? "conf-medium" : "conf-low";
    return "<tr>" + keys.map(k => {
      const v = r[k] || "—";
      const c = k === "confidence" ? ` class="${cls}"` : "";
      return `<td${c} title="${escHtml(String(v))}">${escHtml(String(v))}</td>`;
    }).join("") + "</tr>";
  }).join("");
}

// ── SSE stream ────────────────────────────────────────────────────────────
function startStream() {
  const es = new EventSource("/api/stream");
  es.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      renderStatus(d.state || {});
      renderTask(d.task || {});
      renderProgress(d.progress || {});
      renderLog(d.log_tail || []);
    } catch(err) {}
  };
  es.onerror = () => setTimeout(startStream, 5000);
}

// ── Slower polls ──────────────────────────────────────────────────────────
async function slowPoll() {
  try {
    const res  = await fetch("/api/status");
    const data = await res.json();
    renderTree(data.tree || []);
    await renderRows();
  } catch(e) {}
}

startStream();
slowPoll();
setInterval(slowPoll, 10000);
</script>
</body>
</html>
