# Zyrcon Labs — NATS configuration
port: 4222

# HTTP monitoring endpoint
http_port: 8222

# JetStream — persistent event storage
jetstream {
  store_dir: "/Users/andy/Zyrcon/cascadia-os/data/nats"
  max_memory_store: 256MB
  max_file_store: 1GB
}

# Logging
log_file: "/Users/andy/Zyrcon/cascadia-os/data/logs/nats.log"
logtime: true

# Limits
max_connections: 100
max_payload: 1MB
