<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyrcon Labs — BELL · Site Connector</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#242424;
  --border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.15);
  --text:#efefef;--muted:#888;--dim:#444;
  --teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.12);
  --green:#22c55e;--amber:#f59e0b;--blue:#60a5fa;--red:#ef4444;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --radius:14px;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--sans);-webkit-font-smoothing:antialiased}

/* ── DEMO SHELL ── */
.demo-wrap{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:40px 24px}
.demo-site{width:100%;max-width:720px;background:#0f1115;border:1px solid var(--border);border-radius:18px;position:relative}
.site-bar{background:#111;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;border-radius:18px 18px 0 0}
.site-dots{display:flex;gap:5px}
.site-dot{width:10px;height:10px;border-radius:50%}
.site-url{font-family:var(--mono);font-size:11px;color:var(--muted);flex:1;text-align:center}
.site-content{padding:40px 36px 340px;border-radius:0 0 18px 18px}
.site-logo{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);margin-bottom:6px}
.site-tagline{font-size:14px;color:var(--muted);margin-bottom:28px}
.site-hero{width:100%;height:160px;background:linear-gradient(135deg,#1a1f2e 0%,#111520 100%);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.site-hero-text{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}

/* ── BELL · Site Connector BUTTON ── */
.bell-btn{position:absolute;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;z-index:10}
.bell-btn:hover{transform:scale(1.08)}
.bell-btn svg{width:22px;height:22px;fill:none;stroke:#000;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bell-badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--green);border:2px solid #0f1115}

/* ── CHAT WINDOW ── */
.chat-window{
  position:absolute;top:64px;right:24px;width:340px;
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--radius);display:flex;flex-direction:column;
  overflow:hidden;opacity:0;pointer-events:none;
  transform:translateY(10px) scale(0.97);
  transition:opacity .22s,transform .22s;z-index:20;
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
}
.chat-window.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}

/* ── HEADER ── */
.chat-header{
  padding:14px 16px;background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.chat-avatar{
  width:32px;height:32px;border-radius:50%;background:var(--teal);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-avatar svg{width:16px;height:16px;fill:none;stroke:#000;stroke-width:2;stroke-linecap:round}
.chat-info{flex:1}
.chat-name{font-size:13px;font-weight:500;color:var(--text)}
.chat-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.chat-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:2px}
.chat-close:hover{color:var(--text)}

/* ── MESSAGES ── */
.chat-messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;min-height:380px;max-height:460px;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

.msg{max-width:88%;display:flex;flex-direction:column;gap:3px;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.scout{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg-bubble{padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.55;word-break:break-word}
.msg.scout .msg-bubble{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:var(--teal);color:#000;font-weight:500;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--dim)}
.msg.scout .msg-time{margin-left:4px}
.msg.user .msg-time{align-self:flex-end;margin-right:4px}

/* ── STREAMING MESSAGE ── */
.msg-streaming .msg-bubble::after{
  content:'▋';
  display:inline-block;
  color:var(--teal);
  animation:blink .7s step-end infinite;
  margin-left:1px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── THINKING STATE ── */
.thinking-wrap{
  align-self:flex-start;display:flex;flex-direction:column;gap:5px;
  animation:msgIn .18s ease;
}
.thinking-label{
  font-size:10px;font-family:var(--mono);letter-spacing:.06em;
  text-transform:uppercase;color:var(--dim);margin-left:4px;margin-bottom:2px;
}

/* Processing badges — scroll in one by one */
.badge-row{display:flex;flex-wrap:wrap;gap:5px;max-width:280px}
.proc-badge{
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:20px;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--muted);white-space:nowrap;
  opacity:0;transform:translateY(4px);
  transition:opacity .25s ease,transform .25s ease;
}
.proc-badge.visible{opacity:1;transform:translateY(0)}
.proc-badge.active{
  background:var(--teal-dim);border-color:rgba(45,212,191,0.25);
  color:var(--teal);
}

/* ── SCAN ANIMATION (the custom loader) ── */
.scan-loader{
  display:flex;align-items:center;gap:8px;
  padding:10px 13px;background:var(--surface2);
  border-radius:13px;border-bottom-left-radius:4px;
  width:140px;
}
.scan-track{
  flex:1;height:2px;background:var(--surface3);
  border-radius:2px;overflow:hidden;position:relative;
}
.scan-beam{
  position:absolute;top:0;left:-40%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  animation:scan 1.2s ease-in-out infinite;
}
@keyframes scan{
  0%{left:-40%}
  100%{left:140%}
}
.scan-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--teal);flex-shrink:0;
  animation:pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot{
  0%,100%{opacity:0.3;transform:scale(0.8)}
  50%{opacity:1;transform:scale(1)}
}

/* ── CONFIRMATION CARD ── */
.chat-confirm{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:rgba(45,212,191,0.08);border:1px solid rgba(45,212,191,0.2);
  border-radius:10px;
}
.confirm-icon{
  width:24px;height:24px;border-radius:50%;
  background:rgba(45,212,191,0.15);
  display:flex;align-items:center;justify-content:center;
  color:var(--teal);flex-shrink:0;margin-top:1px;
}
.confirm-title{font-size:12px;font-weight:500;color:var(--teal);margin-bottom:2px}
.confirm-sub{font-size:12px;color:rgba(45,212,191,0.7);line-height:1.4}

/* ── INPUT ── */
.chat-input-area{padding:10px 12px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;font-size:13px;color:var(--text);
  font-family:var(--sans);resize:none;outline:none;
  min-height:38px;max-height:100px;line-height:1.4;
}
.chat-input::placeholder{color:var(--dim)}
.chat-input:focus{border-color:var(--teal)}
.chat-send{
  width:36px;height:36px;border-radius:9px;background:var(--teal);
  border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:opacity .15s;
}
.chat-send:hover{opacity:.85}
.chat-send:disabled{opacity:.35;cursor:not-allowed}
.chat-send svg{width:15px;height:15px;fill:none;stroke:#000;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

.chat-footer{padding:6px 12px 10px;text-align:center;flex-shrink:0}
.chat-footer a{font-size:10px;color:var(--dim);text-decoration:none;font-family:var(--mono);letter-spacing:.04em}
.chat-footer a:hover{color:var(--muted)}
</style>
</head>
<body>
<div class="demo-wrap">
  <div class="demo-site">

    <div class="site-bar">
      <div class="site-dots">
        <div class="site-dot" style="background:#ff5f57"></div>
        <div class="site-dot" style="background:#febc2e"></div>
        <div class="site-dot" style="background:#28c840"></div>
      </div>
      <div class="site-url">zyrcon.ai</div>
    </div>

    <div class="site-content">
      <div class="site-logo">Zyrcon Labs</div>
      <div class="site-tagline">Industrial Drafting &amp; Warehouse Design · Houston, TX</div>
      <div class="site-hero">
        <div class="site-hero-text">Warehouse Design · Industrial Drafting · Facility Layout</div>
      </div>
    </div>

    <button class="bell-btn" id="bellBtn" onclick="toggleChat()">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <div class="bell-badge"></div>
    </button>

    <div class="chat-window" id="chatWindow">
      <div class="chat-header">
        <div class="chat-avatar">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
        <div class="chat-info">
          <div class="chat-name">SCOUT · Lead Engine</div>
          <div class="chat-status"><div class="status-dot"></div>Online · Zyrcon Labs</div>
        </div>
        <button class="chat-close" onclick="toggleChat()">×</button>
      </div>

      <div class="chat-messages" id="messages"></div>

      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="chat-send" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

      <div class="chat-footer">
        <a href="http://localhost:7001/prism" target="_blank">Powered by Zyrcon</a>
      </div>
    </div>

  </div>
</div>

<script>
const SERVER = 'http://localhost:8000';
let sessionId  = null;
let isOpen     = false;
let isWaiting  = false;
let started    = false;

// Thinking badge sequences — rotate through these while waiting
const THINKING_STAGES = [
  ["Reading message", "Loading context", "Checking policy"],
  ["Parsing request", "Reviewing scope", "Drafting reply"],
  ["Analyzing need", "Matching services", "Preparing answer"],
  ["Understanding project", "Checking availability", "Forming response"],
];

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chatWindow').classList.toggle('open', isOpen);
  if (isOpen && !started) { started = true; setTimeout(sendGreeting, 420); }
  if (isOpen) document.getElementById('chatInput').focus();
}

function sendGreeting() {
  showThinking();
  setTimeout(() => {
    removeThinking();
    addMessage('scout', "Hi there! I'm SCOUT, the Zyrcon Labs assistant. Whether you're designing a new warehouse, retrofitting an existing facility, or need industrial drafting services in the Houston area — I'm here to help. What brings you to the site today?");
  }, 1400);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || isWaiting) return;

  input.value = '';
  input.style.height = 'auto';
  isWaiting   = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showThinking();

  try {
    await streamResponse(text);
  } catch (err) {
    removeThinking();
    addMessage('scout', "I'm having a brief connection issue. Please try again in a moment.");
  }

  isWaiting = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

// ── STREAMING ENGINE ──────────────────────────────────────────────────────
async function streamResponse(text) {
  const res = await fetch(`${SERVER}/api/stream`, {
    method:  'POST',
    headers: {'Content-Type': 'application/json'},
    body:    JSON.stringify({session_id: sessionId, message: text}),
  });

  if (!res.ok) throw new Error('Stream request failed');

  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer    = '';
  let streamBubble = null;
  let fullText  = '';
  let gotFirstToken = false;

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, {stream: true});
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      let event;
      try { event = JSON.parse(line.slice(6)); } catch { continue; }

      switch (event.type) {

        case 'session':
          sessionId = event.session_id;
          break;

        case 'thinking':
          updateThinkingBadge(event.msg);
          break;

        case 'token':
          if (!gotFirstToken) {
            gotFirstToken = true;
            removeThinking();
            streamBubble = createStreamBubble();
          }
          fullText += event.token;
          updateStreamBubble(streamBubble, fullText);
          break;

        case 'done':
          if (streamBubble) finalizeStreamBubble(streamBubble, fullText);
          if (event.lead_captured) setTimeout(showConfirmation, 700);
          break;
      }
    }
  }

  // Fallback if stream ended without tokens
  if (!gotFirstToken) {
    removeThinking();
    addMessage('scout', "I'm having a brief connection issue. Please try again.");
  }
}

// ── THINKING UI ───────────────────────────────────────────────────────────
let thinkingEl   = null;
let thinkingTimer = null;
let badgeStage   = 0;

function showThinking() {
  removeThinking();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'thinking-wrap';
  wrap.id = 'thinkingEl';

  const stage = THINKING_STAGES[Math.floor(Math.random() * THINKING_STAGES.length)];

  wrap.innerHTML = `
    <div class="thinking-label">Processing</div>
    <div class="badge-row" id="badgeRow">
      ${stage.map((b,i) => `<div class="proc-badge" id="badge${i}">${b}</div>`).join('')}
    </div>
    <div class="scan-loader">
      <div class="scan-dot"></div>
      <div class="scan-track"><div class="scan-beam"></div></div>
    </div>
  `;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  thinkingEl = wrap;

  // Animate badges in one by one
  stage.forEach((_,i) => {
    setTimeout(() => {
      const b = document.getElementById(`badge${i}`);
      if (b) {
        b.classList.add('visible');
        // Make previous badge inactive, current active
        if (i > 0) {
          const prev = document.getElementById(`badge${i-1}`);
          if (prev) prev.classList.remove('active');
        }
        b.classList.add('active');
      }
    }, i * 380);
  });
}

function updateThinkingBadge(msg) {
  if (!thinkingEl) return;
  const row = document.getElementById('badgeRow');
  if (!row) return;
  const extra = document.createElement('div');
  extra.className = 'proc-badge visible active';
  extra.textContent = msg;
  row.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
  row.appendChild(extra);
}

function removeThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  clearTimeout(thinkingTimer);
}

// ── STREAMING BUBBLE ──────────────────────────────────────────────────────
function createStreamBubble() {
  const msgs = document.getElementById('messages');
  const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const wrap = document.createElement('div');
  wrap.className = 'msg scout msg-streaming';
  wrap.innerHTML = `
    <div class="msg-bubble" id="streamText"></div>
    <div class="msg-time">${now}</div>
  `;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function updateStreamBubble(wrap, text) {
  const el = wrap.querySelector('#streamText');
  if (el) el.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function finalizeStreamBubble(wrap, text) {
  wrap.classList.remove('msg-streaming');
  const el = wrap.querySelector('#streamText');
  if (el) el.textContent = text;
}

// ── MESSAGES ─────────────────────────────────────────────────────────────
function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-time">${now}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showConfirmation() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg scout';
  div.innerHTML = `
    <div class="chat-confirm">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div>
        <div class="confirm-title">You're all set</div>
        <div class="confirm-sub">A member of the Zyrcon Labs team will be in touch shortly.</div>
      </div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
