<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Setup — Zyrcon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f7fa;
  --white: #ffffff;
  --navy-900: #111827;
  --navy-800: #374151;
  --navy-700: #4a5568;
  --gray-400: #94a3b8;
  --gray-300: #94a3b8;
  --gray-200: #e8edf4;
  --gray-150: #e8edf4;
  --gray-100: #f0f4f8;
  --gray-50: #f5f7fa;
  --green: #34d399;
  --green-soft: rgba(52,211,153,.12);
  --red: #f87171;
  --accent: #4facfe;
  --accent-soft: rgba(79,172,254,.1);
  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
  --ease: cubic-bezier(.25,1,.5,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; font-family: var(--font); background: var(--bg); color: var(--navy-900); -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: var(--font); }
input, textarea, select { font-family: var(--font); }

/* Layout */
.wizard-wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.wizard-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 16px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 4px 24px rgba(0,0,0,.06);
  overflow: hidden;
}

/* Progress bar */
.wiz-progress {
  height: 3px;
  background: var(--gray-200);
}
.wiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4facfe, #a78bfa);
  border-radius: 0 2px 2px 0;
  transition: width .4s var(--ease);
}

/* Header */
.wiz-header {
  padding: 24px 28px 0;
}
.wiz-step-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--gray-400);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.wiz-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--navy-900);
  line-height: 1.2;
  margin-bottom: 6px;
}
.wiz-body-text {
  font-size: 14px;
  color: var(--navy-700);
  line-height: 1.5;
}

/* Content */
.wiz-content {
  padding: 20px 28px;
  min-height: 200px;
}

/* Footer */
.wiz-footer {
  padding: 16px 28px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--gray-150);
}

/* Buttons */
.btn {
  height: 38px;
  padding: 0 20px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  transition: all .15s;
}
.btn-primary {
  background: var(--navy-900);
  color: #fff;
}
.btn-primary:hover { background: #000; }
.btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--navy-700);
  border: 1px solid var(--gray-200);
}
.btn-ghost:hover { background: var(--gray-100); }
.btn-ghost:disabled { color: var(--gray-300); cursor: not-allowed; }
.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn-outline:hover { background: var(--accent-soft); }

/* Radio cards */
.radio-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.radio-card {
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.radio-card:hover { border-color: var(--accent); background: var(--accent-soft); }
.radio-card.selected { border-color: var(--accent); background: var(--accent-soft); }
.radio-card input[type="radio"] { margin-top: 2px; accent-color: var(--accent); }
.radio-card-label { font-size: 13px; font-weight: 600; color: var(--navy-800); }
.radio-card-sub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* Toggles */
.toggle-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-150);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-row-text { flex: 1; }
.toggle-row-title { font-size: 13px; font-weight: 600; color: var(--navy-800); }
.toggle-row-sub { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.toggle {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
  margin-top: 1px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--gray-300);
  border-radius: 12px;
  cursor: pointer;
  transition: background .2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  left: 3px;
  top: 3px;
  width: 18px;
  height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle input:checked + .toggle-slider { background: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

/* Operator install cards */
.op-cards { display: flex; flex-direction: column; gap: 10px; }
.op-card {
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.op-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: linear-gradient(135deg,#4facfe,#a78bfa);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.op-info { flex: 1; }
.op-name { font-size: 13px; font-weight: 700; color: var(--navy-800); }
.op-desc { font-size: 11.5px; color: var(--gray-400); margin-top: 2px; }
.op-add-btn {
  height: 30px;
  padding: 0 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  background: transparent;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.op-add-btn:hover { background: var(--accent-soft); }
.op-add-btn.added { border-color: var(--green); color: var(--green); background: var(--green-soft); cursor: default; }

/* Email connect buttons */
.email-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  color: var(--navy-800);
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 10px;
}
.email-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
.email-btn .cs-badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  color: var(--gray-400);
  font-family: var(--mono);
  letter-spacing: .04em;
}

/* License input */
.license-row {
  display: flex;
  gap: 8px;
}
.license-input {
  flex: 1;
  height: 40px;
  border: 1.5px solid var(--gray-200);
  border-radius: 9px;
  padding: 0 14px;
  font-size: 13px;
  font-family: var(--mono);
  color: var(--navy-800);
  outline: none;
  transition: border-color .15s;
}
.license-input:focus { border-color: var(--accent); }
.license-msg {
  margin-top: 10px;
  font-size: 12px;
  min-height: 20px;
}
.license-msg.ok { color: var(--green); }
.license-msg.err { color: var(--red); }

/* Flow diagram */
.flow-diagram {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
  row-gap: 4px;
  margin: 16px 0;
}
.flow-step {
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy-800);
}
.flow-arrow {
  font-size: 14px;
  color: var(--gray-300);
  padding: 0 6px;
}

/* Finish buttons */
.finish-btns { display: flex; flex-direction: column; gap: 10px; }

/* Step 3 — AI model setup */
.hw-card{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:14px;margin-bottom:12px}
.hw-label{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.hw-row{display:flex;justify-content:space-between;font-size:12px;color:var(--navy-700);padding:3px 0}
.hw-row strong{color:var(--navy-800)}
.model-rec-card{border:1.5px solid var(--accent);background:var(--accent-soft);border-radius:10px;padding:14px;margin-bottom:12px}
.model-rec-label{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.model-rec-name{font-size:15px;font-weight:700;color:var(--navy-900);margin-bottom:2px}
.model-rec-desc{font-size:12px;color:var(--navy-700);margin-bottom:8px}
.model-rec-size{font-size:13px;font-weight:700;color:var(--navy-800);margin-bottom:12px}
.model-ready-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--green);padding:8px 0}
.dl-progress-wrap{margin-top:10px}
.dl-progress-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--gray-400);margin-bottom:4px}
.dl-progress-track{height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden}
.dl-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width .4s var(--ease)}
.model-tier-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.model-tier-card{flex:1;min-width:100px;border:1.5px solid var(--gray-200);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;background:var(--white)}
.model-tier-card:hover{border-color:var(--accent);background:var(--accent-soft)}
.model-tier-card.tier-selected{border-color:var(--accent);background:var(--accent-soft)}
.tier-name{font-size:12px;font-weight:700;color:var(--navy-800);margin-bottom:2px}
.tier-size{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
.tier-desc{font-size:11px;color:var(--gray-400);line-height:1.4}
.tier-badge{display:inline-block;font-size:9px;font-weight:600;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:1px 5px;font-family:var(--mono);text-transform:uppercase;margin-top:4px}
.adv-toggle-btn{background:none;border:none;font-size:12px;color:var(--accent);padding:0;cursor:pointer;font-family:var(--font);margin-bottom:6px}
.skip-link-btn{display:block;width:100%;background:none;border:none;font-size:12px;color:var(--gray-400);cursor:pointer;text-decoration:underline;text-align:center;font-family:var(--font);margin-top:10px}
.skip-link-btn:hover{color:var(--navy-700)}
.disk-warn{font-size:11px;color:#b45309;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;padding:8px 10px;margin-top:6px}
</style>
</head>
<body>
<div class="wizard-wrap">
  <div class="wizard-card">
    <div class="wiz-progress"><div class="wiz-progress-fill" id="prog-fill" style="width:14%"></div></div>
    <div id="wiz-inner"><!-- rendered by JS --></div>
  </div>
  <div style="margin-top:16px;font-size:11px;color:var(--gray-400);font-family:var(--mono)">Cascadia OS · Zyrcon Labs</div>
</div>

<script>
const PRISM = 'http://127.0.0.1:6300';
const TOTAL_STEPS = 8;

const state = {
  step: 1,
  licenseKey: '',
  licenseTier: 'lite',
  businessType: '',
  approvalRules: { email: true, api: true, crm: true },
  installedOps: [],
  alertEmail: '',
};

// Persist progress on page unload (mid-wizard exit)
window.addEventListener('beforeunload', () => {
  if (state.step > 1 && state.step < TOTAL_STEPS) {
    fetch(PRISM + '/api/wizard/save-progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ step: state.step }),
      keepalive: true,
    }).catch(() => {});
  }
});

function setProgress(step) {
  document.getElementById('prog-fill').style.width = Math.round((step / TOTAL_STEPS) * 100) + '%';
}

function render() {
  setProgress(state.step);
  const inner = document.getElementById('wiz-inner');
  inner.innerHTML = steps[state.step]();
  // Auto-focus first input if any
  const inp = inner.querySelector('input[type="text"],input[type="password"]');
  if (inp) setTimeout(() => inp.focus(), 50);
}

function next() {
  if (state.step < TOTAL_STEPS) {
    state.step++;
    render();
    // Save progress to backend
    fetch(PRISM + '/api/wizard/save-progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ step: state.step }),
    }).catch(() => {});
  }
}

function back() {
  if (state.step > 1) { state.step--; render(); }
}

function footer(backDisabled) {
  const nextLabel = state.step === TOTAL_STEPS ? 'Finish' : 'Next';
  const nextAction = state.step === TOTAL_STEPS ? 'completeWizard()' : 'next()';
  return `<div class="wiz-footer">
    <button class="btn btn-ghost" onclick="back()" ${backDisabled ? 'disabled' : ''}>Back</button>
    <button class="btn btn-primary" onclick="${nextAction}">${nextLabel}</button>
  </div>`;
}

// ─── STEP RENDERERS ───────────────────────────────────────────────────────────

const steps = {
  1: () => `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 1 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">Welcome to Zyrcon</div>
      <div class="wiz-body-text">Private AI operators for your business. Let's get you set up in under 5 minutes.</div>
    </div>
    <div class="wiz-content" style="display:flex;flex-direction:column;gap:12px;justify-content:center">
      <div style="background:linear-gradient(135deg,rgba(79,172,254,.08),rgba(167,139,250,.08));border:1px solid rgba(79,172,254,.15);border-radius:12px;padding:20px 18px">
        <div style="font-size:13px;font-weight:700;color:var(--navy-800);margin-bottom:8px">What Zyrcon does:</div>
        <ul style="font-size:13px;color:var(--navy-700);line-height:1.7;padding-left:16px">
          <li>AI operators handle routine tasks — leads, quotes, follow-ups</li>
          <li>Nothing is sent without your approval</li>
          <li>Runs entirely on your machine — your data stays private</li>
        </ul>
      </div>
    </div>
    <div class="wiz-footer">
      <div></div>
      <button class="btn btn-primary" onclick="next()">Get Started</button>
    </div>`,

  2: () => `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 2 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">Activate License</div>
      <div class="wiz-body-text">Enter your license key to unlock Pro features, or continue with the free Lite plan.</div>
    </div>
    <div class="wiz-content">
      <div class="license-row">
        <input class="license-input" id="lic-input" type="text" placeholder="ZYRCON-PRO-xxxxxxxxxxxxxxxx" value="${esc(state.licenseKey)}" oninput="state.licenseKey=this.value.trim()">
        <button class="btn btn-outline" onclick="activateLicense()">Activate</button>
      </div>
      <div class="license-msg" id="lic-msg">${state.licenseTier !== 'lite' ? '<span class="ok">✓ ' + state.licenseTier.charAt(0).toUpperCase()+state.licenseTier.slice(1) + ' unlocked</span>' : ''}</div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-150)">
        <button class="btn btn-ghost" style="width:100%" onclick="skipLicense()">Continue with Lite (free)</button>
      </div>
    </div>
    ${footer(false)}`,

  3: () => `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 3 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">AI Model Setup</div>
      <div class="wiz-body-text">Cascadia OS runs AI locally. Detecting your hardware to recommend the right model.</div>
    </div>
    <div class="wiz-content" id="step3-content">
      <div id="hw-loading" class="hw-card" style="text-align:center;font-size:12px;color:var(--gray-400);padding:16px">Detecting your hardware…</div>
      <div id="hw-card" style="display:none"></div>
      <div id="model-rec-section" style="display:none"></div>
      <div id="adv-wrap" style="display:none">
        <button class="adv-toggle-btn" id="adv-toggle-btn" onclick="toggleStep3Adv()">▸ Advanced: choose a different model</button>
        <div id="adv-panel" style="display:none"></div>
      </div>
      <div id="dl-section" style="display:none"></div>
      <div id="step3-skip-wrap" style="display:none">
        <button class="skip-link-btn" onclick="step3Skip()">Skip for now — configure AI model in Settings later</button>
      </div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--gray-150)">
        <button class="btn btn-outline" style="width:100%;height:40px" id="demo-wiz-btn" onclick="runWizardDemo()">Run Demo Workflow</button>
        <div id="demo-wiz-msg" style="margin-top:10px;font-size:12px;min-height:18px;color:var(--navy-700)"></div>
      </div>
    </div>
    <div class="wiz-footer">
      <button class="btn btn-ghost" onclick="back()">Back</button>
      <button class="btn btn-primary" id="step3-next-btn" onclick="next()" disabled>Next</button>
    </div>`,

  4: () => {
    const types = [
      {id:'contractor',   label:'Contractor / Construction', sub:'Leads, quotes, scheduling'},
      {id:'warehouse',    label:'Warehouse / Industrial',    sub:'Logistics, inventory, ops'},
      {id:'professional', label:'Professional Services',     sub:'Proposals, billing, clients'},
      {id:'medical',      label:'Medical / Clinic',          sub:'Intake, follow-up, records'},
      {id:'retail',       label:'Retail / E-commerce',       sub:'Orders, invoices, social'},
      {id:'general',      label:'General Small Business',    sub:'Leads, quotes, follow-up'},
    ];
    return `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 4 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">Choose Business Type</div>
      <div class="wiz-body-text">We'll suggest the right operators for your industry.</div>
    </div>
    <div class="wiz-content">
      <div class="radio-grid">
        ${types.map(t => `
          <label class="radio-card${state.businessType===t.id?' selected':''}" onclick="selectBizType('${t.id}')">
            <input type="radio" name="biz" value="${t.id}" ${state.businessType===t.id?'checked':''} onchange="selectBizType('${t.id}')">
            <div>
              <div class="radio-card-label">${t.label}</div>
              <div class="radio-card-sub">${t.sub}</div>
            </div>
          </label>`).join('')}
      </div>
    </div>
    ${footer(false)}`;
  },

  5: () => `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 5 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">Connect Email (optional)</div>
      <div class="wiz-body-text">Connect your email so operators can draft and send messages on your behalf.</div>
    </div>
    <div class="wiz-content">
      <button class="email-btn" onclick="showEmailComingSoon('Gmail')">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 24.8l-22.4-16H46.4z"/><path fill="#FBBC05" d="M1.6 8.8v30.4L16 25.6z"/><path fill="#34A853" d="M46.4 8.8L32 25.6l14.4 13.6z"/><path fill="#4285F4" d="M1.6 39.2L19.2 27.2l4.8 3.6 4.8-3.6 17.6 12z"/></svg>
        Connect Gmail
        <span class="cs-badge">coming soon</span>
      </button>
      <button class="email-btn" onclick="showEmailComingSoon('Outlook')">
        <svg width="20" height="20" viewBox="0 0 48 48"><rect fill="#0078D4" width="48" height="48" rx="4"/><path fill="white" d="M8 12h14v24H8zm20 0h12v5H28zm0 9h12v5H28zm0 9h12v6H28z"/></svg>
        Connect Outlook
        <span class="cs-badge">coming soon</span>
      </button>
      <div style="margin-top:14px;padding:12px;background:var(--gray-50);border-radius:9px;font-size:12px;color:var(--gray-400)">
        Operators will never send email without your explicit approval.
      </div>
      <div style="margin-top:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--navy-700);margin-bottom:6px">
          Alert email address <span style="font-weight:400;color:var(--gray-400)">(optional)</span>
        </label>
        <input
          id="alert-email-input"
          type="email"
          class="license-input"
          style="width:100%"
          placeholder="you@example.com"
          value="${esc(state.alertEmail||'')}"
          oninput="state.alertEmail=this.value.trim(); saveAlertEmail(this.value.trim())"
        >
        <div style="margin-top:5px;font-size:11px;color:var(--gray-400)">
          Zyrcon will email you if any operator goes offline for more than 10 minutes.
        </div>
      </div>
      <div id="email-msg" style="margin-top:10px;font-size:12px;min-height:18px;color:var(--navy-700)"></div>
    </div>
    ${footer(false)}`,

  6: () => {
    const suggestions = {

      <div class="wiz-step-label">Step 6 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">Install First Operator</div>
      <div class="wiz-body-text">Based on your business type, we recommend these operators to get started.</div>
    </div>
    <div class="wiz-content">
      <div class="op-cards">
        ${ops.map(op => `
          <div class="op-card">

            <div class="op-info">
              <div class="op-name">${op.label}</div>
              <div class="op-desc">${op.desc}</div>
            </div>
            <button class="op-add-btn${state.installedOps.includes(op.id)?' added':''}" id="op-btn-${op.id}"
              onclick="installOp('${op.id}', this)">
              ${state.installedOps.includes(op.id) ? '✓ Added' : '+ Install'}

          <div class="toggle-row-title">Always require approval before sending email</div>
          <div class="toggle-row-sub">Operators draft; you review and send</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="rule-email" ${state.approvalRules.email?'checked':''} onchange="state.approvalRules.email=this.checked">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-row-text">
          <div class="toggle-row-title">Always require approval before external API calls</div>
          <div class="toggle-row-sub">CRM writes, webhooks, third-party calls</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="rule-api" ${state.approvalRules.api?'checked':''} onchange="state.approvalRules.api=this.checked">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div class="toggle-row-text">
          <div class="toggle-row-title">Always require approval before writing CRM records</div>
          <div class="toggle-row-sub">New contacts, deals, notes, updates</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="rule-crm" ${state.approvalRules.crm?'checked':''} onchange="state.approvalRules.crm=this.checked">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    ${footer(false)}`,

  8: () => `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 8 of ${TOTAL_STEPS}</div>
      <div class="wiz-title">You're Ready</div>
      <div class="wiz-body-text">Here's how Zyrcon works in your business:</div>
    </div>
    <div class="wiz-content">
      <div class="flow-diagram">
        <div class="flow-step">Lead arrives</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">Operator works</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">You approve</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">Action completes</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">Audit recorded</div>
      </div>
      <div style="margin-top:16px;font-size:13px;color:var(--navy-700);line-height:1.6">
        Every action is logged and chain-verified. You stay in control — always.
      </div>
      <div class="finish-btns" style="margin-top:20px">
        <button class="btn btn-primary" style="width:100%;height:44px;font-size:14px" id="btn-open-dashboard" onclick="completeWizard()">Open Dashboard</button>
        <button class="btn btn-ghost" style="width:100%;height:44px" onclick="runDemo()">Run Demo First</button>
      </div>
      <div id="wizard-complete-msg" class="wiz-body-text" style="text-align:center;min-height:18px;margin-top:10px"></div>

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectBizType(id) {
  state.businessType = id;
  // Re-render radio cards only
  document.querySelectorAll('.radio-card').forEach(el => {
    const inp = el.querySelector('input[type="radio"]');
    if (inp) {
      const sel = inp.value === id;
      el.classList.toggle('selected', sel);
      inp.checked = sel;
    }
  });
}

async function activateLicense() {
  const key = state.licenseKey.trim();
  const msg = document.getElementById('lic-msg');
  if (!key) { msg.innerHTML = '<span class="err">Please enter a license key</span>'; return; }
  // Route through the real license activation endpoint — never fake-unlock tiers client-side
  try {
    const r = await fetch(PRISM + '/api/prism/license/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: key }),
      signal: AbortSignal.timeout(5000),
    });
    const d = await r.json();
    if (r.ok && d.tier) {
      state.licenseTier = d.tier;
      msg.innerHTML = `<span class="ok">✓ ${d.tier.charAt(0).toUpperCase()+d.tier.slice(1)} unlocked</span>`;
    } else {
      state.licenseTier = 'lite';
      msg.innerHTML = `<span class="err">${d.error || 'Invalid license key'} — continuing as Lite</span>`;
    }
  } catch(e) {
    console.warn('[Zyrcon] License server unavailable:', e);
    state.licenseTier = 'lite';
    msg.innerHTML = '<span class="err">License server unavailable — continuing as Lite</span>';
  }
}

function skipLicense() {
  state.licenseTier = 'lite';
  next();
}

function showEmailComingSoon(provider) {
  document.getElementById('email-msg').textContent = provider + ' integration coming soon — you can connect it later in Settings.';
}

async function saveAlertEmail(email) {
  if (!email) return;
  try {
    await fetch(PRISM + '/api/wizard/save-progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ alert_email: email }),
    });
  } catch(_) {}
}

function installOp(id, btn) {
  if (!state.installedOps.includes(id)) state.installedOps.push(id);
  btn.classList.add('added');
  btn.textContent = '✓ Added to recommended operators';
  btn.disabled = true;
}

async function completeWizard() {
  const msgEl  = document.getElementById('wizard-complete-msg');
  const openBtn = document.getElementById('btn-open-dashboard');
  if (openBtn) { openBtn.disabled = true; openBtn.textContent = 'Opening…'; }
  try {
    const resp = await fetch(PRISM + '/api/wizard/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        business_type:  state.businessType,
        approval_rules: state.approvalRules,
        alert_email:    state.alertEmail,
      }),
      signal: AbortSignal.timeout(5000),
    });
    if (resp.ok) {
      if (msgEl) msgEl.textContent = 'Setup complete! Opening your dashboard…';
      await new Promise(r => setTimeout(r, 1500));
      window.location.href = '/';
    } else {
      if (msgEl) {
        msgEl.textContent = 'Could not save settings — click here to open dashboard';
        msgEl.style.cursor = 'pointer';
        msgEl.onclick = () => window.location.href = '/';
      }
      if (openBtn) { openBtn.disabled = false; openBtn.textContent = 'Open Dashboard'; }
    }
  } catch(_) {
    window.location.href = '/';
  }
}

async function runDemo() {
  try {
    await fetch(PRISM + '/api/demo/seed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
      signal: AbortSignal.timeout(5000),
    });
  } catch(_) {}
  await completeWizard();
  window.location.href = '/?demo=1';
}

async function runWizardDemo() {
  const btn = document.getElementById('demo-wiz-btn');
  const msg = document.getElementById('demo-wiz-msg');
  if (btn) { btn.disabled = true; btn.textContent = 'Running…'; }
  try {
    await fetch(PRISM + '/api/prism/demo/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
      signal: AbortSignal.timeout(5000),
    });
    if (msg) msg.textContent = 'Demo queued — you'll see an approval card when you open the dashboard.';
    if (btn) btn.textContent = 'Demo started!';
  } catch(_) {
    if (msg) msg.textContent = 'Could not reach PRISM — start Cascadia OS first.';
    if (btn) { btn.disabled = false; btn.textContent = 'Run Demo Workflow'; }
  }
}

// ─── STEP 3: AI MODEL SETUP ─────────────────────────────────────────────────

const MODEL_CATALOG = {
  '3b':  { name:'Qwen 2.5 3B',  file:'qwen2.5-3b-instruct-q4_k_m.gguf',  size_gb:2.0, size_label:'2.0 GB', description:'Fast and efficient. Good for most tasks.' },
  '7b':  { name:'Qwen 2.5 7B',  file:'qwen2.5-7b-instruct-q4_k_m.gguf',  size_gb:4.7, size_label:'4.7 GB', description:'Best quality for business workflows.' },
  '14b': { name:'Qwen 2.5 14B', file:'qwen2.5-14b-instruct-q4_k_m.gguf', size_gb:9.0, size_label:'9.0 GB', description:'Maximum quality. Requires 16 GB+ RAM.' },
};
const GPU_LABELS = { apple_silicon:'Apple Silicon', nvidia:'NVIDIA GPU', intel_mac:'Intel Mac', cpu_only:'CPU only', unknown:'Unknown' };

let _hwData = null;
let _selectedTier = '7b';
let _step3Poll = null;
let _freeDiskGb = null;

function recommendTier(hw) {
  if (hw.gpu_type === 'apple_silicon') return hw.ram_gb >= 8 ? '7b' : '3b';
  if (hw.gpu_type === 'nvidia') return (hw.vram_gb || 0) >= 8 ? '7b' : '3b';
  return hw.rec_model || '3b';
}

function step3Init() {
  _hwData = null;
  if (_step3Poll) { clearInterval(_step3Poll); _step3Poll = null; }

  fetch(PRISM + '/api/prism/setup/hardware')
    .then(r => r.json())
    .then(hw => {
    _hwData = hw;
    _freeDiskGb = hw.free_disk_gb != null ? hw.free_disk_gb : null;
    _selectedTier = hw.recommended || hw.rec_model || recommendTier(hw);

    const gpuLabel = GPU_LABELS[hw.gpu_type] || hw.gpu_type || 'Unknown';
    const diskRow = _freeDiskGb != null
      ? `<div class="hw-row"><span>Disk</span><strong>${_freeDiskGb} GB available</strong></div>` : '';
    document.getElementById('hw-loading').style.display = 'none';
    const hwCard = document.getElementById('hw-card');
    hwCard.innerHTML = `<div class="hw-card">
      <div class="hw-label">Your Hardware</div>
      <div class="hw-row"><span>RAM</span><strong>${hw.ram_gb} GB</strong></div>
      <div class="hw-row"><span>GPU</span><strong>${esc(hw.chip || gpuLabel)} — ${gpuLabel}</strong></div>
      ${diskRow}
    </div>`;
    hwCard.style.display = 'block';

    const recSec = document.getElementById('model-rec-section');
    if (hw.current_model) {
      recSec.innerHTML = `<div class="model-rec-card" style="border-color:var(--green);background:var(--green-soft)">
        <div class="model-ready-row"><span style="font-size:18px">✓</span>
        <span>AI model already installed: ${esc(hw.current_model)}</span></div></div>`;
      _step3EnableNext();
    } else {
      const rec = MODEL_CATALOG[_selectedTier] || MODEL_CATALOG['7b'];
      recSec.innerHTML = `<div class="model-rec-card">
        <div class="model-rec-label">Recommended for your hardware</div>
        <div class="model-rec-name">${esc(rec.name)}</div>
        <div class="model-rec-desc">${esc(rec.description)}</div>
        <div class="model-rec-size">Download size: <strong>${esc(rec.size_label)}</strong></div>
        <button class="btn btn-primary" id="btn-download-recommended" data-tier="${_selectedTier}"
                style="width:100%;height:40px" onclick="startModelDownload('${_selectedTier}')">
          Download ${esc(rec.name)} — ${esc(rec.size_label)}
        </button>
      </div>`;
      step3BuildAdvPanel();
      document.getElementById('adv-wrap').style.display = 'block';
      step3BuildDlStatus();
      document.getElementById('step3-skip-wrap').style.display = 'block';
    }
    recSec.style.display = 'block';
  }).catch(() => {
    document.getElementById('hw-loading').innerHTML =
      '<span style="color:var(--red)">Could not reach PRISM — is Cascadia OS running?</span>';
    _step3EnableNext();
  });
}

function step3BuildAdvPanel() {
  const panel = document.getElementById('adv-panel');
  if (!panel) return;
  const cards = ['3b','7b','14b'].map(t => {
    const m = MODEL_CATALOG[t];
    const isRec = t === _selectedTier;
    const bigFile = _freeDiskGb != null && m.size_gb > _freeDiskGb * 0.8;
    return `<div class="model-tier-card${isRec?' tier-selected':''}" id="tier-card-${t}" onclick="step3SelectTier('${t}')">
      <div class="tier-name">${esc(m.name)}</div>
      <div class="tier-size">${esc(m.size_label)}</div>
      <div class="tier-desc">${esc(m.description)}</div>
      ${isRec ? '<div class="tier-badge">Recommended</div>' : ''}
      ${bigFile ? '<div style="font-size:10px;color:#b45309;margin-top:4px">⚠ Large for your disk</div>' : ''}
    </div>`;
  }).join('');
  const diskLine = _freeDiskGb != null
    ? `<div style="font-family:var(--mono);font-size:11px;color:var(--gray-400);margin-bottom:4px">Available disk: ${_freeDiskGb} GB</div>` : '';
  const rec = MODEL_CATALOG[_hwData ? (_hwData.recommended || _hwData.rec_model || '7b') : '7b'];
  const diskWarn = rec && _freeDiskGb != null && rec.size_gb > _freeDiskGb * 0.8
    ? `<div class="disk-warn">⚠ Low disk — consider ${esc(MODEL_CATALOG['3b'].name)} (${esc(MODEL_CATALOG['3b'].size_label)})</div>` : '';
  panel.innerHTML = `<div style="padding-top:8px">
    <div class="model-tier-grid">${cards}</div>
    ${diskLine}${diskWarn}
    <button class="btn btn-primary" id="btn-download-selected" style="width:100%;height:40px;margin-top:8px"
            onclick="startModelDownload(_selectedTier)">
      Download ${esc(MODEL_CATALOG[_selectedTier].name)} — ${esc(MODEL_CATALOG[_selectedTier].size_label)}
    </button>
    <button class="adv-toggle-btn" style="margin-top:6px" onclick="step3ResetToRec()">← Back to Recommended</button>
  </div>`;
}

function step3BuildDlStatus() {
  const dlSec = document.getElementById('dl-section');
  if (!dlSec) return;
  dlSec.innerHTML = `
    <div id="dl-progress-section" style="display:none">
      <div class="dl-progress-wrap">
        <div class="dl-progress-labels">
          <span id="dl-status-text">Downloading…</span>
          <span id="dl-pct-text"></span>
        </div>
        <div class="dl-progress-track"><div class="dl-progress-fill" id="dl-progress-fill"></div></div>
        <div id="dl-speed-text" style="font-family:var(--mono);font-size:11px;color:var(--gray-400);margin-top:4px"></div>
      </div>
    </div>`;
  dlSec.style.display = 'block';
}

function step3SelectTier(tier) {
  _selectedTier = tier;
  ['3b','7b','14b'].forEach(t => {
    const c = document.getElementById('tier-card-' + t);
    if (c) c.classList.toggle('tier-selected', t === tier);
  });
  const btn = document.getElementById('btn-download-selected');
  if (btn) {
    const m = MODEL_CATALOG[tier];
    btn.textContent = `Download ${m.name} — ${m.size_label}`;
  }
}

function toggleStep3Adv() {
  const panel = document.getElementById('adv-panel');
  const btn   = document.getElementById('adv-toggle-btn');
  if (!panel || !btn) return;
  const open = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  btn.textContent = (open ? '▾' : '▸') + ' Advanced: choose a different model';
}

function step3ResetToRec() {
  if (!_hwData) return;
  _selectedTier = _hwData.recommended || _hwData.rec_model || recommendTier(_hwData);
  step3SelectTier(_selectedTier);
  const panel = document.getElementById('adv-panel');
  const btn   = document.getElementById('adv-toggle-btn');
  if (panel) panel.style.display = 'none';
  if (btn)   btn.textContent = '▸ Advanced: choose a different model';
}

function startModelDownload(tier) {
  tier = (typeof tier === 'string') ? tier : _selectedTier;
  const m = MODEL_CATALOG[tier];
  ['btn-download-recommended','btn-download-selected'].forEach(id => {
    const b = document.getElementById(id);
    if (b) { b.disabled = true; b.textContent = 'Starting download…'; }
  });
  const progSec = document.getElementById('dl-progress-section');
  if (progSec) progSec.style.display = 'block';
  fetch(PRISM + '/api/prism/setup/download-model', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model_tier: tier }),
    signal: AbortSignal.timeout(10000),
  }).then(r => r.json()).then(d => {
    if (d.status === 'already_exists') { _step3ShowReady(d.model || MODEL_CATALOG[tier]?.name || 'Model'); return; }
    if (d.error) { _step3ShowError(d.error); return; }
    _step3Poll = setInterval(pollStep3Download, 2000);
  }).catch(() => _step3ShowError('Could not reach PRISM — start Cascadia OS first.'));
}

function pollStep3Download() {
  fetch(PRISM + '/api/prism/setup/download-status')
    .then(r => r.json())
    .then(d => {
      if (d.status === 'complete') {
        clearInterval(_step3Poll); _step3Poll = null;
        _step3ShowReady(MODEL_CATALOG[_selectedTier]?.name || 'Model');
      } else if (d.status === 'error') {
        clearInterval(_step3Poll); _step3Poll = null;
        _step3ShowError('Download failed. Check your connection and try again.');
      } else if (d.status === 'downloading') {
        const pct = Math.min(99, Math.max(0, d.percent || 0));
        const fill    = document.getElementById('dl-progress-fill');
        const pctEl   = document.getElementById('dl-pct-text');
        const speedEl = document.getElementById('dl-speed-text');
        const statEl  = document.getElementById('dl-status-text');
        if (fill)   fill.style.width = pct + '%';
        if (pctEl)  pctEl.textContent = pct + '%';
        if (speedEl) {
          const speed  = d.speed_mbps || 0;
          const etaMin = (d.eta_seconds || 0) > 0 ? Math.ceil(d.eta_seconds / 60) : '?';
          speedEl.textContent = speed > 0 ? `${speed.toFixed(1)} MB/s · ${etaMin} min remaining` : 'Calculating…';
        }
        if (statEl) statEl.textContent = 'Downloading…';
      }
    }).catch(() => {});
}

function _step3ShowReady(label) {
  const dlSec = document.getElementById('dl-section');
  if (dlSec) dlSec.innerHTML =
    `<div class="model-ready-row"><span style="font-size:18px">✓</span><span>AI model ready: ${esc(label)}</span></div>`;
  const sw = document.getElementById('step3-skip-wrap');
  if (sw) sw.style.display = 'none';
  _step3EnableNext();
}

function _step3ShowError(msg) {
  const statusEl = document.getElementById('dl-status-text');
  if (statusEl) statusEl.textContent = msg;
  ['btn-download-recommended','btn-download-selected'].forEach(id => {
    const b = document.getElementById(id);
    if (b) { b.disabled = false; b.textContent = 'Retry Download'; }
  });
}

function _step3EnableNext() {
  const btn = document.getElementById('step3-next-btn');
  if (btn) btn.disabled = false;
}

async function step3Skip() {
  if (_step3Poll) { clearInterval(_step3Poll); _step3Poll = null; }
  try {
    await fetch(PRISM + '/api/wizard/save-progress', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ wizard_model_skipped: true }),
    });
  } catch(_) {}
  _step3EnableNext();
  const sw = document.getElementById('step3-skip-wrap');
  if (sw) sw.style.display = 'none';
}

// Patch render to init step 3 on entry
const _origRender = render;
render = function() {
  _origRender();
  if (state.step === 3) {
    if (_step3Poll) { clearInterval(_step3Poll); _step3Poll = null; }
    step3Init();
  }
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
